<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дарина · Книга детства</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f7;
      --sidebar-bg: #f2efe9;
      --card: #ffffff;
      --text: #2d2a24;
      --muted: #7a7570;
      --accent: #8b5e3c;
      --accent2: #6d4a2e;
      --border: #e5e0d8;
      --warm: #c4a882;
      --page-bg: #fffef9;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* ── AUTH ── */
    #auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 200; }
    .auth-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 44px 40px; width: 340px; text-align: center; }
    .auth-box h1 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; margin-bottom: 4px; }
    .auth-box p { color: var(--muted); font-size: 0.85rem; margin-bottom: 24px; }
    .auth-box input { display: block; width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.875rem; font-family: inherit; background: var(--bg); color: var(--text); margin-bottom: 9px; }
    .auth-box input:focus { outline: 2px solid var(--accent); border-color: transparent; }
    .auth-box button { width: 100%; padding: 9px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-size: 0.875rem; font-family: inherit; cursor: pointer; margin-top: 2px; }
    .auth-box button:hover { background: var(--accent2); }
    #auth-err { color: #c0392b; font-size: 0.8rem; margin-top: 8px; display: none; }

    /* ── TOPBAR ── */
    .topbar { height: 50px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 18px; gap: 20px; flex-shrink: 0; }
    .topbar-title { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 400; white-space: nowrap; }
    .topbar-title span { color: var(--muted); }
    .tabs { display: flex; gap: 3px; }
    .tab { padding: 5px 13px; border: none; border-radius: 5px; font-size: 0.83rem; font-family: inherit; cursor: pointer; background: none; color: var(--muted); transition: all .12s; }
    .tab:hover { background: var(--sidebar-bg); color: var(--text); }
    .tab.on { background: var(--accent); color: #fff; }
    #top-stats { margin-left: auto; font-size: 0.78rem; color: var(--muted); white-space: nowrap; }

    /* ── LAYOUT ── */
    #app { display: none; flex-direction: column; height: 100vh; }
    .body { display: flex; flex: 1; overflow: hidden; }

    /* ── SIDEBAR ── */
    .sidebar { width: 215px; min-width: 215px; background: var(--sidebar-bg); border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
    .sb-add { margin: 10px 10px 6px; padding: 7px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-size: 0.82rem; font-family: inherit; cursor: pointer; }
    .sb-add:hover { background: var(--accent2); }
    .sb-export { margin: 0 10px 10px; padding: 5px; background: none; color: var(--muted); border: 1px solid var(--border); border-radius: 6px; font-size: 0.76rem; font-family: inherit; cursor: pointer; }
    .sb-export:hover { background: var(--border); }
    #year-nav { flex: 1; }
    .yr-btn { width: 100%; padding: 6px 14px; background: none; border: none; text-align: left; font-size: 0.75rem; font-weight: 600; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: space-between; text-transform: uppercase; letter-spacing: .05em; }
    .yr-btn:hover, .yr-btn.open { color: var(--accent); }
    .yr-cnt { font-size: 0.68rem; background: var(--border); border-radius: 9px; padding: 1px 6px; }
    .yr-entries { display: none; }
    .yr-entries.open { display: block; }
    .er { padding: 4px 14px 4px 22px; font-size: 0.78rem; cursor: pointer; color: var(--muted); border-left: 2px solid transparent; line-height: 1.35; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .er:hover { background: rgba(0,0,0,.04); color: var(--text); }
    .er.on { border-left-color: var(--accent); color: var(--text); background: rgba(139,94,60,.07); }
    .er-icon { margin-right: 4px; }

    /* ── MAIN ── */
    .main { flex: 1; overflow-y: auto; }

    /* ── EDITOR ── */
    .editor { padding: 26px 30px; max-width: 680px; }
    .editor h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; font-weight: 400; margin-bottom: 18px; }
    .frow { display: flex; gap: 10px; margin-bottom: 13px; }
    .fg { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .fg label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
    .fg select, .fg input[type=text], .fg textarea { padding: 7px 10px; border: 1px solid var(--border); border-radius: 5px; font-size: 0.875rem; font-family: inherit; background: var(--card); color: var(--text); width: 100%; }
    .fg select:focus, .fg input[type=text]:focus, .fg textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
    .fg textarea { resize: vertical; min-height: 110px; line-height: 1.65; }
    .photo-area { border: 2px dashed var(--border); border-radius: 7px; padding: 18px; text-align: center; cursor: pointer; min-height: 100px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; transition: border-color .12s; }
    .photo-area:hover { border-color: var(--accent); }
    .photo-area img { max-width: 100%; max-height: 220px; border-radius: 5px; }
    .photo-hint { color: var(--muted); font-size: 0.78rem; }
    .actions { display: flex; gap: 8px; margin-top: 18px; flex-wrap: wrap; }
    .btn-p { padding: 7px 18px; background: var(--accent); color: #fff; border: none; border-radius: 5px; font-family: inherit; font-size: 0.875rem; cursor: pointer; }
    .btn-p:hover { background: var(--accent2); }
    .btn-s { padding: 7px 14px; background: none; color: var(--muted); border: 1px solid var(--border); border-radius: 5px; font-family: inherit; font-size: 0.875rem; cursor: pointer; }
    .btn-s:hover { background: var(--sidebar-bg); }
    .btn-d { padding: 7px 14px; background: none; color: #c0392b; border: 1px solid #c0392b; border-radius: 5px; font-family: inherit; font-size: 0.875rem; cursor: pointer; }
    .btn-d:hover { background: #fdecea; }
    .tag-wrap { display: flex; flex-wrap: wrap; gap: 5px; }
    .tg { padding: 3px 9px; border-radius: 11px; font-size: 0.72rem; border: 1px solid var(--border); cursor: pointer; background: var(--card); color: var(--muted); }
    .tg.on { background: var(--accent); color: #fff; border-color: var(--accent); }
    .empty { padding: 60px 30px; text-align: center; color: var(--muted); }
    .empty h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; color: var(--text); margin-bottom: 10px; }

    /* ── PREVIEW ── */
    .preview { padding: 28px; background: #e8e4db; }
    .prev-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
    .prev-bar h2 { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); }
    .pages { display: flex; flex-direction: column; gap: 22px; align-items: center; }
    .pg { width: 440px; min-height: 624px; background: var(--page-bg); box-shadow: 0 2px 18px rgba(0,0,0,.09); border-radius: 2px; padding: 40px 36px 48px; display: flex; flex-direction: column; position: relative; }
    .pg-num { position: absolute; bottom: 16px; right: 30px; font-size: 0.67rem; color: #ccc; }
    /* cover */
    .pg-cover { background: #2b2318; justify-content: flex-end; overflow: hidden; padding: 0; }
    .cv-bg-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: .55; }
    .cv-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(30,20,10,.85) 40%, rgba(30,20,10,.25)); }
    .cv-content { position: relative; z-index: 1; padding: 36px; margin-top: auto; }
    .cv-title { font-family: 'Cormorant Garamond', serif; font-size: 3.2rem; font-weight: 300; color: #fff; line-height: 1.1; margin-bottom: 10px; white-space: pre-wrap; }
    .cv-sub { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; color: rgba(255,255,255,.72); font-style: italic; white-space: pre-wrap; margin-bottom: 18px; }
    .cv-author { font-size: 0.72rem; color: rgba(255,255,255,.5); letter-spacing: .1em; text-transform: uppercase; margin-top: auto; padding-top: 28px; }
    .pg-cover-back { background: #2b2318; justify-content: center; align-items: center; }
    .cv-back-text { font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: rgba(255,255,255,.6); text-align: center; line-height: 1.8; white-space: pre-wrap; }
    /* endpaper */
    .pg-endpaper { background: #f5ede0; justify-content: center; align-items: center; }
    .ep-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: .3; }
    .ep-text { position: relative; z-index: 1; font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: #7a6148; text-align: center; line-height: 2; font-style: italic; white-space: pre-wrap; }
    /* year opener */
    .pg-yr { justify-content: flex-start; }
    .yr-big { font-family: 'Cormorant Garamond', serif; font-size: 5rem; font-weight: 300; color: var(--warm); line-height: 1; margin-bottom: 2px; }
    .yr-age { font-size: 0.85rem; color: var(--muted); margin-bottom: 24px; }
    .yr-fact { font-size: 0.82rem; color: var(--muted); border-left: 3px solid var(--warm); padding-left: 13px; line-height: 1.75; font-style: italic; max-width: 360px; margin-bottom: 24px; }
    .yr-photo { margin-top: auto; width: 100%; height: 210px; background: #edeae3; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #bfb3a3; font-size: 0.78rem; overflow: hidden; }
    .yr-photo img { width: 100%; height: 100%; object-fit: cover; }
    /* notes */
    .pg-notes .nb { margin-bottom: 26px; }
    .pg-notes .nb:last-child { margin-bottom: 0; }
    .nd { font-size: 0.67rem; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--warm); margin-bottom: 5px; }
    .nt { font-family: 'Cormorant Garamond', serif; font-size: 1.02rem; line-height: 1.85; white-space: pre-wrap; }
    /* photo page */
    .pg-ph .ph-img { width: 100%; flex: 1; min-height: 260px; background: #edeae3; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #bfb3a3; font-size: 0.78rem; overflow: hidden; margin-bottom: 18px; }
    .pg-ph .ph-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
    /* quote */
    .pg-qt { justify-content: center; }
    .qt-mark { font-family: 'Cormorant Garamond', serif; font-size: 6rem; line-height: .55; color: var(--warm); margin-bottom: 22px; }
    .qt-text { font-family: 'Cormorant Garamond', serif; font-size: 1.45rem; font-style: italic; line-height: 1.8; }
    .qt-attr { margin-top: 20px; font-size: 0.78rem; color: var(--muted); }
    /* drawing */
    .pg-dr .dr-img { width: 100%; flex: 0 0 290px; background: #fafaf6; border: 1px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #bfb3a3; font-size: 0.78rem; overflow: hidden; margin-bottom: 14px; }
    .pg-dr .dr-img img { max-width: 100%; max-height: 290px; object-fit: contain; }
    .dr-cap { font-family: 'Cormorant Garamond', serif; font-size: 0.9rem; color: var(--muted); text-align: center; font-style: italic; }
    /* special */
    .pg-sp .sp-head { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--warm); margin-bottom: 14px; }
    /* location pages */
    .pg-loc { padding: 0; overflow: hidden; }
    .loc-img { width: 100%; height: 52%; background: #e8e0d4; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
    .loc-img img { width: 100%; height: 100%; object-fit: cover; }
    .loc-img-ph { color: #bfb3a3; font-size: 0.82rem; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .loc-body { padding: 24px 30px 36px; display: flex; flex-direction: column; flex: 1; }
    .loc-pin { font-size: 1.1rem; margin-bottom: 6px; }
    .loc-title { font-family: 'Cormorant Garamond', serif; font-size: 1.55rem; font-weight: 400; line-height: 1.2; margin-bottom: 5px; }
    .loc-sub { font-size: 0.78rem; color: var(--warm); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }
    .loc-desc { font-family: 'Cormorant Garamond', serif; font-size: 0.95rem; line-height: 1.75; color: var(--text); white-space: pre-wrap; flex: 1; }
    .loc-year { margin-top: auto; font-size: 0.68rem; color: var(--muted); letter-spacing: .05em; padding-top: 10px; }
    /* interview pages */
    .pg-interview { }
    .iv-pg-head { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--warm); margin-bottom: 16px; }
    .iv-pg-cont { color: var(--muted); }
    .iv-pg-body { font-family: 'Cormorant Garamond', serif; font-size: 0.92rem; line-height: 1.8; white-space: pre-wrap; overflow: hidden; flex: 1; }
    /* year opener opener-row in sidebar */
    .er-opener { background: var(--sidebar-bg); font-style: italic; color: var(--accent); }

    /* ── CONCEPT ── */
    .concept { padding: 30px 36px; max-width: 700px; }
    .concept h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.9rem; font-weight: 300; margin-bottom: 6px; }
    .concept .lead { color: var(--muted); font-size: 0.9rem; line-height: 1.75; margin-bottom: 24px; }
    .concept h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 500; color: var(--accent); margin: 26px 0 9px; }
    .concept p { font-size: 0.875rem; line-height: 1.75; margin-bottom: 9px; }
    .concept ul { margin: 0 0 12px 16px; }
    .concept li { font-size: 0.85rem; line-height: 1.7; margin-bottom: 3px; }
    .ctbl { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin: 10px 0 18px; }
    .ctbl th { text-align: left; padding: 7px 11px; background: var(--sidebar-bg); font-weight: 600; border: 1px solid var(--border); }
    .ctbl td { padding: 7px 11px; border: 1px solid var(--border); vertical-align: top; }

    /* ── INTERVIEW ── */
    .interview { padding: 30px 36px; max-width: 720px; }
    .iv-header { margin-bottom: 24px; }
    .iv-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.9rem; font-weight: 300; margin-bottom: 6px; }
    .iv-header p { color: var(--muted); font-size: 0.875rem; line-height: 1.7; }
    .iv-progress { display: inline-flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 0.8rem; color: var(--muted); }
    .iv-bar { width: 160px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .iv-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }
    .iv-block { background: var(--card); border: 1px solid var(--border); border-radius: 9px; padding: 18px 20px; margin-bottom: 14px; transition: border-color .15s; }
    .iv-block:focus-within { border-color: var(--warm); }
    .iv-block.answered { border-left: 3px solid var(--accent); }
    .iv-num { font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--warm); margin-bottom: 6px; }
    .iv-q { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; line-height: 1.65; color: var(--text); margin-bottom: 10px; }
    .iv-a { width: 100%; border: none; border-top: 1px solid var(--border); padding: 10px 0 4px; font-size: 0.875rem; font-family: inherit; color: var(--text); background: transparent; resize: none; line-height: 1.65; min-height: 38px; outline: none; }
    .iv-a::placeholder { color: var(--border); }
    .iv-actions { display: flex; gap: 8px; margin-top: 18px; }
    .iv-export-btn { margin-top: 0; }

    /* ── PRINT ── */
    @media print {
      body { overflow: visible; height: auto; }
      .topbar, .sidebar, #auth-overlay, .prev-bar { display: none !important; }
      .body { display: block; }
      .main { overflow: visible; }
      .preview { padding: 0; background: white; }
      .pages { gap: 0; }
      .pg { width: 148mm; min-height: 210mm; box-shadow: none; border-radius: 0; padding: 14mm 13mm 18mm 12mm; page-break-after: always; margin: 0 auto; }
      .pg-cover, .pg-cover-back { page-break-after: always; }
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-overlay">
  <div class="auth-box">
    <h1>Дарина</h1>
    <p>Книга детства · личный раздел</p>

</div>

<!-- APP -->
<div id="app">
  <div class="topbar">

      <div id="year-nav"></div>
    </div>
    <div class="main" id="main"></div>
  </div>
</div>

<script>

  {type:'note',year:2014,month:'Август',text:'— А как дельфинчика зовут? Мама говорит — Сурфик.\n— Не, говорит Даряква, Сурфик — это такой маленький мышонок.',tags:['животные','слова']},
  {type:'note',year:2014,month:'Август',text:'Рядом с дельфинарием:\n— Я в тебя брошу бревно, не хочу чтобы ты пел\n(это папе)',tags:['характер']},

  {type:'note',year:2014,month:'Август',text:'— Мы с папой поругались.\n(Это после того, как папа что-то сказал Дарякве) — и не хочет мириться',tags:['характер']},
  {type:'note',year:2014,month:'Август',text:'Даряква притирается к папе и просит прокатиться на шее. А мы тебе вечером массаж будем делать — предвосхищает возражения.',tags:['характер']},
  {type:'note',year:2014,month:'Август',text:'В Болгарии:\n— Мне надо ненадолго отойти, — говорит Даряква и идёт на детскую площадку. Немного катается на лошадке и возвращается.',tags:['путешествия']},
  {type:'note',year:2014,month:'Август',text:'В Болгарии, сразу на входе в номер:\n— А я ничего такого грязного не трогала. Или: — Я нигде не пачкалась.',tags:['путешествия','характер']},
  {type:'note',year:2014,month:'Июль',text:'— Не буду слушаться, мне некогда, я режу, — так ответила Дарьква бабушке.',tags:['характер']},

  {type:'note',year:2014,month:'Март',text:'Лазилка в комнате — это кораблик, на котором все плывут',tags:['игры']},
  {type:'note',year:2014,month:'Февраль',text:'Дарюха любит немного изогнуться, замереть и манерно построить глазки',tags:['характер']},
  {type:'note',year:2014,month:'Январь',text:'— Больше всех папа нравится, — сказала Даринка после купания. Очень мимимишно.',tags:['характер']},
  {type:'note',year:2014,month:'Январь',text:'Огромное разочарование — купили хлеба и пошли кормить козочек, а большая козочка сразу выхватила весь хлеб. Даряква поджала губки и чуть было не разрыдалась. Уткнулась в маму и сказала, что больше не пойдём кормить козочек.',tags:['животные','еда','характер']},
  {type:'note',year:2014,month:'Январь',text:'Мама научила Дарюху: надо подойти к папе, дёрнуть за штанину и сказать: «Папа, дай йемня».',tags:['еда','слова']},
  {type:'note',year:2014,month:'Январь',text:'Дарюхе понравились индийские животные — козочки нюхали ручку и лизали, и кепку ещё. А Дарюха к ним бесстрашно подходит и предлагает им сено.',tags:['животные','путешествия']},
  {type:'note',year:2014,month:'Январь',text:'На таможне индийской:\n— Дядя спросит, а кто это к нам в Индию приехал?\n— А это Даришка',tags:['путешествия']},
  {type:'note',year:2014,month:'Январь',text:'Дарюхе нравится самодельная песенка «и папа, и мама, и Даринка...» — она всегда просит продолжения. Например «...пойдут гулять» или «...и бегемот стоит»',tags:['музыка','характер']},
  // 2013
  {type:'note',year:2013,month:'Декабрь',text:'Дед мороз Дарюхе всю неделю до Нового года клал под ёлку подарочки. А когда её спрашивали, что дед мороз принесёт на Новый год, она просила — хлеба и баранок.',tags:['еда','характер']},
  {type:'note',year:2013,month:'Декабрь',text:'В гостях у деды Володи — Дарюха перетаскала всех керамических зверей. Они все хоровод водили. Только одну куклу не захотела взять. Дарюхе звери больше людей нра.',tags:['животные','характер']},
  {type:'note',year:2013,month:'Декабрь',text:'Ребёнку очень сложно понять разницу между «тебе» и «мне».\n«Дать печенюшку тебе»',tags:['слова']},
  {type:'note',year:2013,month:'Декабрь',text:'Дарюха начинает учить стихи и песенки. Про Крокодила Гену, про Мишку, про Вин Пуха.',tags:['музыка']},
  {type:'note',year:2013,month:'Ноябрь',text:'Дарюха выучила, какая у неё фамилия — Моргось.',tags:['характер']},
  {type:'note',year:2013,month:'Ноябрь',text:'Дарюхе стали нравиться истории «про конька». Конёк делает всё то же, что и Даришка. В основном — ходить в кафе.',tags:['еда','характер']},
  {type:'note',year:2013,month:'Октябрь',text:'— Горшок холодный, надо его погреть.',tags:['характер']},
  {type:'note',year:2013,month:'Октябрь',text:'Очень быстро у Дарюхи получается играть в игру «Компот — пить, хлеб — есть»',tags:['игры','еда']},
  {type:'note',year:2013,month:'Октябрь',text:'Если чёто Дарюхе нравится, она просит «есе-есе». Нравится ей в основном вкусная еда.',tags:['еда','слова']},
  {type:'note',year:2013,month:'Октябрь',text:'Дарюха впервые пошла в ЦИПРП — там её научили каравай водить и в мячики играть.',tags:['игры']},
  {type:'note',year:2013,month:'Октябрь',text:'Дарюхе показали, как можно играть листьями, ей понравилось кидаться. В Парке Победы, однажды с бабой Таней.',tags:['игры']},
  {type:'note',year:2013,month:'Сентябрь',text:'Дарюхе очень нравится в кафе — любит там всё заказывать, а потом рассказывать.',tags:['еда','характер']},
  {type:'note',year:2013,month:'Сентябрь',text:'— Бабушка на меня ругается.\n— А за что ругается?\n— Ругается за горшок',tags:['характер']},
  {type:'note',year:2013,month:'Сентябрь',text:'Кузнечики чирик-чирик. И сверчки также. Они прячутся в кустах.',tags:['слова']},
  {type:'note',year:2013,month:'Сентябрь',text:'Дарюха поехала на море, ещё накануне всем говорила, что полетит на самолёте. В аэропортах нравится — там много места и красиво. В этот раз удалось увидеть Даринкин самолёт заранее — он оказался большой и зелёный.',tags:['путешествия']},
  {type:'note',year:2013,month:'Сентябрь',text:'Дарюха стала прогонять папу — казалось бы, стоит он, никого не трогает, но Дарюха показывает на папу и говорит «папа — уходи», иногда добавляет «на работу», а иногда начинает ругаться и драться.',tags:['характер']},
  {type:'note',year:2013,month:'Сентябрь',text:'Дарюха побывала на дне рождения Алинки — там ела много хлеба и яблок. А ещё там было две лошадки — одна большая и одна пони. Дарюха сначала наблюдала, а потом согласилась сесть на маленькую пони. Ей понравилось, крепко держалась и проехала полкруга.',tags:['животные','друзья']},
  {type:'note',year:2013,month:'Август',text:'Дарюха никогда не ела мороженое. Но однажды взяла маленький резиновый мячик, положила его в маленькое ведёрко и сказала — мороженое. Получилось и правда как рожок. Дарюха его минут 10 потом ела.',tags:['еда','игры','характер']},
  {type:'note',year:2013,month:'Август',text:'Дарюха почему-то боится муху. Она внимательно следит за ней, показывает пальцем и говорит «боится». Вообще, когда Дарюха чего-то боится, она сразу в этом честно признаётся, начинает прижиматься к маме и обнимать её.',tags:['характер']},
  {type:'note',year:2013,month:'Август',text:'Дарюха очень любит ходить в кафе — там всегда перепадёт что-нить вкусненькое. В «восточной комнате» ей понравилась красивая лампа и много риса. Есть Дарюха может, вроде бы, вообще без остановки, особенно если хлеб и яблоки.',tags:['еда']},
  {type:'note',year:2013,month:'Август',text:'Дарюха точно знает, что ходить надо «на гофок». И когда неожиданность случается, иногда констатирует «ай-яй-ай».',tags:['слова']},
  {type:'note',year:2013,month:'Август',text:'«Комары и мошки пляшут по дорожке» — Дарюхе понравился этот танец. Бегает и прыгает вслед за родителями и смеётся. Почти получается топать и хлопать в такт.',tags:['музыка']},
  {type:'note',year:2013,month:'Август',text:'Даряква надела несколько резиночек на руку, а потом, когда сняла их, заметила отпечатки. Решила, что стоит заплакать, стала говорить «бо-бо» и показывать папе. Папа говорит, что всё нормально — тогда Даряква, отставив руку, побежала к маме жаловаться.',tags:['характер']},
  {type:'note',year:2013,month:'Август',text:'Даряква обучилась одному приёму: если взять папу за оба уха сразу — он высовывает язык и начинает смешно звучать. С мамой тоже прокатывает — единственное отличие: нельзя с соской в это время быть.',tags:['характер','игры']},

// ── INIT ──────────────────────────────────────────────────────────────────────
function init() {
  const saved = load();
  if (saved) { entries = saved; ensureInterviewEntry(); } else seed();
  renderSidebar();
  updateStats();
  switchTab('editor');
}

// ── TABS ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(b => b.onclick = () => switchTab(b.dataset.tab));
function switchTab(tab) {
  curTab = tab;
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('on', b.dataset.tab === tab));
  if (tab === 'editor')  { curId ? renderEditor(curId) : renderEmpty(); }
  if (tab === 'preview') { renderPreview(); }
  if (tab === 'interview') { renderInterview(); }
  if (tab === 'concept') { renderConcept(); }
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function snip(e) {
  if (e.type === 'year-opener') return `📅 Заставка ${e.year}`;
  if (e.type === 'cover')    return e.year === 0 ? '📘 Обложка (передняя)' : '📘 Обложка (задняя)';
  if (e.type === 'endpaper') return e.month === 'front' ? '📄 Форзац (передний)' : '📄 Форзац (задний)';
  if (e.type === 'location') return `📍 ${e.caption || '(без названия)'}`;
  const t = (e.text || e.caption || '').replace(/\n/g, ' ');
  return t.length > 38 ? t.slice(0, 38) + '…' : t || '(пусто)';
}
function renderSidebar() {
  const nav = document.getElementById('year-nav');
  nav.innerHTML = '';

  // ── Dedicated Locations section ──────────────────────────────────────────
  const locs = entries.filter(e => e.type === 'location')
    .sort((a, b) => a.year - b.year || MONTHS.indexOf(a.month) - MONTHS.indexOf(b.month));
  const locsOpen = openYears.has('locs');
  const locSec = document.createElement('div');
  locSec.innerHTML = `
    <button class="yr-btn ${locsOpen ? 'open' : ''}" data-yr="locs" style="color:var(--warm)">
      📍 Локации <span class="yr-cnt">${locs.length}</span>
    </button>
    <div class="yr-entries ${locsOpen ? 'open' : ''}">
      ${locs.map(e => `
        <div class="er ${e.id === curId ? 'on' : ''}" data-id="${e.id}">
          <span class="er-icon">📍</span>${escH(e.caption || '(без названия)')}
        </div>`).join('')}
      <div class="er er-add" data-action="add-loc" style="opacity:.6;font-style:italic">
        <span class="er-icon">＋</span>Добавить локацию
      </div>
    </div>`;
  locSec.querySelector('.yr-btn').onclick = () => {
    locsOpen ? openYears.delete('locs') : openYears.add('locs');
    renderSidebar();
  };
  locSec.querySelectorAll('.er[data-id]').forEach(r => r.onclick = () => {
    curId = r.dataset.id; renderSidebar();
    if (curTab !== 'editor') switchTab('editor'); else renderEditor(curId);
  });
  const addLocBtn = locSec.querySelector('[data-action="add-loc"]');
  if (addLocBtn) addLocBtn.onclick = () => {
    const e = {id:uid(),type:'location',year:2013,month:null,caption:'',subtitle:'',text:'',photo:null,historicFact:'',tags:['путешествия'],order:(entries.length+1)*10};
    entries.push(e); save(); curId=e.id; openYears.add('locs'); renderSidebar();
    if (curTab !== 'editor') switchTab('editor'); else renderEditor(curId);
  };
  nav.appendChild(locSec);

  // ── Year groups ──────────────────────────────────────────────────────────
  YEARS.forEach(yr => {
    const opener = entries.find(e => e.year === yr && e.type === 'year-opener');
    const yrs = entries.filter(e => e.year === yr && e.type !== 'year-opener' && e.type !== 'location')
      .sort((a, b) => MONTHS.indexOf(a.month) - MONTHS.indexOf(b.month));
    const open = openYears.has(yr);
    const sec = document.createElement('div');
    const openerHtml = (opener && yr >= 2011 && yr <= 2018) ? `
      <div class="er er-opener ${opener.id === curId ? 'on' : ''}" data-id="${opener.id}">
        <span class="er-icon">📅</span>Заставка года
      </div>` : '';
    sec.innerHTML = `
      <button class="yr-btn ${open ? 'open' : ''}" data-yr="${yr}">
        ${escH(yearLabel(yr))} <span class="yr-cnt">${yrs.length}</span>
      </button>
      <div class="yr-entries ${open ? 'open' : ''}">
        ${openerHtml}
        ${yrs.map(e => `
          <div class="er ${e.id === curId ? 'on' : ''}" data-id="${e.id}">
            <span class="er-icon">${TICONS[e.type] || '·'}</span>${escH(snip(e))}
          </div>`).join('')}
      </div>`;
    sec.querySelector('.yr-btn').onclick = () => {
      openYears.has(yr) ? openYears.delete(yr) : openYears.add(yr);
      renderSidebar();
    };
    sec.querySelectorAll('.er').forEach(r => r.onclick = () => {
      curId = r.dataset.id;
      renderSidebar();
      if (curTab !== 'editor') switchTab('editor'); else renderEditor(curId);
    });
    nav.appendChild(sec);
  });
}
function updateStats() {
  const skip = ['year-opener','cover','endpaper'];
  const n = entries.filter(e => !skip.includes(e.type)).length;
  const p = entries.filter(e => e.photo).length;
  document.getElementById('top-stats').textContent = `${n} записей · ${p} с фото`;
}

document.getElementById('add-btn').onclick = () => {
  const e = { id: uid(), type: 'note', year: 2013, month: 'Январь', text: '', caption: '', photo: null, historicFact: '', tags: [], order: (entries.length + 1) * 10 };
  entries.push(e);
  save(); curId = e.id; openYears.add(e.year);
  renderSidebar(); updateStats();
  if (curTab !== 'editor') switchTab('editor'); else renderEditor(curId);
};

  a.download = 'darina-book.json'; a.click();
};

document.getElementById('word-btn').onclick = exportToWord;

function exportToWord() {
  const ans = loadAnswers();
  const sorted = [...entries].sort((a,b) => {
    const order = ['cover','endpaper','year-opener','note','note-photo','quote','drawing','location','map','vocabulary','music','characters','letter','interview-transcript'];
    if (a.year !== b.year) return a.year - b.year;
    if (a.type === 'year-opener') return -1;
    if (b.type === 'year-opener') return 1;
    return MONTHS.indexOf(a.month) - MONTHS.indexOf(b.month);
  });

  const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const nl  = s => esc(s).replace(/\n/g,'<br>');

  let html = '';

  // Cover
  const cover = entries.find(e => e.type==='cover' && e.year===0);
  if (cover) {
    const lines = (cover.text||'').split('\n').filter(Boolean);
    html += `<h1 style="text-align:center;font-size:28pt;margin-top:80pt">${esc(lines[0]||'Дарина')}</h1>`;
    if (lines[1]) html += `<h2 style="text-align:center;font-size:18pt;font-weight:normal;color:#7a6148">${esc(lines.slice(1).join(' '))}</h2>`;
    if (cover.caption) html += `<p style="text-align:center;color:#aaa;font-size:11pt">${esc(cover.caption)}</p>`;
    html += `<hr style="margin:40pt 0">`;
  }

  // Years 2011–2026
  const contentYears = [2011,2012,2013,2014,2015,2016,2017,2018,2026];
  contentYears.forEach(yr => {
    const yearEntries = sorted.filter(e => e.year === yr && !['cover','endpaper'].includes(e.type));
    if (!yearEntries.length) return;

    const opener = yearEntries.find(e => e.type === 'year-opener');
    const rest   = yearEntries.filter(e => e.type !== 'year-opener');

    // Year heading
    html += `<h2 style="font-size:22pt;color:#7a6148;border-bottom:2px solid #c8a87a;padding-bottom:6pt;margin-top:30pt">${yr}</h2>`;
    if (opener) {
      const fact = opener.historicFact || HIST[yr] || '';
      if (opener.text) html += `<p style="color:#666;font-style:italic">${esc(opener.text)}</p>`;
      if (fact) html += `<blockquote style="border-left:3px solid #c8a87a;padding-left:12pt;color:#888;font-style:italic;margin:8pt 0 16pt"><em>Историк: </em>${esc(fact)}</blockquote>`;
    }

    rest.forEach(e => {
      if (e.type === 'note' || e.type === 'note-photo') {
        html += `<div style="margin-bottom:16pt">`;
        if (e.month) html += `<p style="font-size:8pt;color:#c8a87a;text-transform:uppercase;letter-spacing:1pt;margin-bottom:2pt">${esc(e.month)} ${yr}</p>`;
        html += `<p style="font-size:12pt;line-height:1.7">${nl(e.text)}</p>`;
        if (e.photo) html += `<p style="font-size:8pt;color:#aaa">[фото]</p>`;
        if (e.caption) html += `<p style="font-size:9pt;color:#888;font-style:italic">${esc(e.caption)}</p>`;
        html += `</div>`;
      } else if (e.type === 'quote') {
        html += `<blockquote style="font-size:14pt;border-left:4px solid #c8a87a;padding-left:16pt;margin:20pt 0;font-style:italic;color:#333">${nl(e.text)}<br><span style="font-size:9pt;color:#aaa">${yr}</span></blockquote>`;
      } else if (e.type === 'drawing') {
        html += `<div style="margin:16pt 0;padding:12pt;border:1px solid #ddd;background:#fafaf6">`;
        html += `<p style="font-size:8pt;color:#c8a87a;text-transform:uppercase">🎨 Рисунок · ${yr}</p>`;
        if (e.photo) html += `<p style="font-size:8pt;color:#aaa">[изображение рисунка]</p>`;
        if (e.caption||e.text) html += `<p style="font-style:italic;font-size:10pt;color:#666">${esc(e.caption||e.text)}</p>`;
        html += `</div>`;
      } else if (e.type === 'vocabulary') {
        html += `<div style="margin:16pt 0;padding:12pt;background:#f9f5ef;border-left:3px solid #c8a87a">`;
        html += `<p style="font-size:9pt;color:#c8a87a;text-transform:uppercase;font-weight:bold">📖 Словарик Дарины</p>`;
        html += `<p style="font-size:11pt;line-height:1.8">${nl(e.text)}</p></div>`;
      } else if (e.type === 'music') {
        html += `<div style="margin:16pt 0;padding:12pt;background:#f5f0f9;border-left:3px solid #b8a0d8">`;
        html += `<p style="font-size:9pt;color:#9070b8;text-transform:uppercase;font-weight:bold">🎵 Музыка · ${yr}</p>`;
        html += `<p style="font-size:11pt;line-height:1.8">${nl(e.text)}</p></div>`;

// ── PREVIEW ───────────────────────────────────────────────────────────────────
function renderPreview() {
  // Separate front/back matter from content
  const frontCovers  = entries.filter(e => (e.type==='cover'||e.type==='endpaper') && e.year===0)
    .sort((a,b) => a.type==='cover' ? -1 : 1);
  const backCovers   = entries.filter(e => (e.type==='cover'||e.type==='endpaper') && e.year===9999)
    .sort((a,b) => a.type==='cover' ? 1 : -1);
  const content      = entries.filter(e => e.type!=='cover' && e.type!=='endpaper');

  const sorted = [...content].sort((a,b)=>{
    if (a.year !== b.year) return a.year-b.year;
    if (a.type==='year-opener' && b.type!=='year-opener') return -1;
    if (b.type==='year-opener' && a.type!=='year-opener') return 1;
    return MONTHS.indexOf(a.month)-MONTHS.indexOf(b.month);
  });

  const pages = []; let batch = [];
  const flush = () => { if (batch.length) { pages.push({t:'notes',es:[...batch]}); batch=[]; } };

  // Front matter
  frontCovers.forEach(e => pages.push({t:e.type==='cover'?'cover':'endpaper', e}));

  sorted.forEach(e => {
    if (e.type==='note' && !e.photo) {
      batch.push(e); if (batch.length>=3) flush();
    } else {
      flush();
      if      (e.type==='year-opener') pages.push({t:'yr',e});
      else if (e.type==='note-photo')  pages.push({t:'ph',e});
      else if (e.type==='drawing')     pages.push({t:'dr',e});
      else if (e.type==='quote')       pages.push({t:'qt',e});
      else if (e.type==='location')    pages.push({t:'loc',e});
      else if (e.type==='interview-transcript') {
        // Split interview into multiple pages
        const chunks = splitText(e.text||'', 1600);
        chunks.forEach((chunk,ci) => pages.push({t:'interview',e,chunk,ci,total:chunks.length}));
      }
      else { batch.push(e); }
    }
  });
  flush();

  // Back matter
  backCovers.forEach(e => pages.push({t:e.type==='endpaper'?'endpaper':'cover', e, back:true}));

  const html = pages.map((p,i) => renderPg(p,i+1)).join('');
  document.getElementById('main').innerHTML = `
    <div class="preview">
      <div class="prev-bar">
        <h2>Предпросмотр книги</h2>
        <span style="color:var(--muted);font-size:0.78rem">${pages.length} стр · формат А5 (148×210 мм)</span>
        <button class="btn-s" onclick="window.print()" style="margin-left:auto">🖨️ Распечатать</button>
      </div>
      <div class="pages">${html}</div>
    </div>`;
}
function splitText(text, chunkSize) {
  const lines = text.split('\n'); const chunks = []; let cur = '';
  for (const line of lines) {
    if ((cur + line).length > chunkSize && cur) { chunks.push(cur.trim()); cur = ''; }
    cur += line + '\n';
  }
  if (cur.trim()) chunks.push(cur.trim());
  return chunks.length ? chunks : [''];
}
function ageStr(yr) {
  const a = yr - 2011;
  if (a <= 0) return 'первые месяцы';
  const w = a===1?'год':a<=4?'года':'лет';
  return `${a} ${w}`;
}
function renderPg(p, n) {
  const num = `<span class="pg-num">${n}</span>`;

  // Cover page
  if (p.t === 'cover') {
    const e = p.e;
    const lines = (e.text||'').split('\n').filter(Boolean);
    const title = lines[0]||'';
    const subtitle = lines.slice(1).join('\n');
    if (p.back) {
      return `<div class="pg pg-cover-back">
        <div class="cv-back-text">${escH(e.text||'')}</div>
        ${num}
      </div>`;
    }
    return `<div class="pg pg-cover">
      ${e.photo ? `<img src="${e.photo}" class="cv-bg-img" alt="">` : ''}
      <div class="cv-overlay"></div>
      <div class="cv-content">
        <div class="cv-title">${escH(title)}</div>
        ${subtitle ? `<div class="cv-sub">${escH(subtitle)}</div>` : ''}
        ${e.caption ? `<div class="cv-author">${escH(e.caption)}</div>` : ''}
      </div>
      ${num}
    </div>`;
  }

  // Endpaper
  if (p.t === 'endpaper') {
    const e = p.e;
    return `<div class="pg pg-endpaper">
      ${e.photo ? `<img src="${e.photo}" class="ep-img" alt="">` : ''}
      ${e.text ? `<div class="ep-text">${escH(e.text)}</div>` : ''}
      ${num}
    </div>`;
  }

  if (p.t === 'yr') {
    const e = p.e;
    const fact = e.historicFact || HIST[e.year] || '';
    return `<div class="pg pg-yr">
      <div class="yr-big">${e.year}</div>
      <div class="yr-age">${ageStr(e.year)}</div>
      ${fact ? `<div class="yr-fact">${escH(fact)}</div>` : ''}
      <div class="yr-photo">${e.photo ? `<img src="${e.photo}">` : 'фото года'}</div>
      ${num}
    </div>`;
  }
  if (p.t === 'notes') {
    return `<div class="pg pg-notes">
      ${p.es.map(e=>`<div class="nb">
        <div class="nd">${e.year}</div>
        <div class="nt">${escH(e.text||'')}</div>
      </div>`).join('')}
      ${num}
    </div>`;
  }
  if (p.t === 'ph') {
    const e = p.e;
    return `<div class="pg pg-ph">
      <div class="ph-img">${e.photo?`<img src="${e.photo}">`:'фотография'}</div>
      <div class="nd">${e.year}</div>
      <div class="nt">${escH(e.text||e.caption||'')}</div>
      ${num}
    </div>`;
  }
  if (p.t === 'dr') {

        <div style="padding:0 18px 18px;border-top:1px solid var(--border)">
          <pre style="font-family:'Cormorant Garamond',serif;font-size:0.98rem;line-height:1.85;white-space:pre-wrap;color:var(--text);margin-top:16px">${escH(TRANSCRIPT)}</pre>
          <div style="margin-top:14px;display:flex;gap:8px">
            <button class="btn-p" onclick="addTranscriptToBook()">+ Добавить в книгу отдельным блоком</button>
          </div>
        </div>
      </details>

      ${blocksHtml}

      <div class="iv-actions">
        <button class="btn-p" onclick="saveAllAnswers()">Сохранить все ответы</button>
        <button class="btn-s iv-export-btn" onclick="exportAnswers()">⬇ Экспорт</button>
      </div>
    </div>`;

  document.querySelectorAll('.iv-a').forEach(ta => {
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
      const block = document.getElementById('ivb-' + ta.dataset.qid);
      if (block) block.classList.toggle('answered', ta.value.trim().length > 0);
    });
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
  });
}

window.saveAllAnswers = () => {
  const ans = loadAnswers();
  document.querySelectorAll('.iv-a').forEach(ta => {
    ans[ta.dataset.qid] = ta.value;
  });
  saveAnswers(ans);
  const b = document.querySelector('.btn-p'); if (b) { b.textContent = '✓ Сохранено'; setTimeout(()=>b.textContent='Сохранить все ответы', 1400); }
  renderInterview();
};

window.exportAnswers = () => {
  const ans = loadAnswers();
  const out = QUESTIONS.map(q => ({ question: q.q, answer: ans[q.id] || '' }));
  const blob = new Blob([JSON.stringify(out, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'darina-interview.json'; a.click();
};

window.addTranscriptToBook = () => {
  const existing = entries.find(e => e.type === 'interview-transcript');
  if (existing) {
    if (!confirm('Запись интервью уже есть в книге. Перезаписать текст расшифровкой?')) return;
    existing.text = TRANSCRIPT;
    existing.caption = 'Голосовое интервью · апрель 2026';
    save();
    alert('Текст обновлён');
  } else {
    ensureInterviewEntry();
    alert('Интервью добавлено в книгу (раздел 2026)');
  }
  openYears.add(2026);
  renderSidebar(); updateStats();
};
